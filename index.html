<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fast Video Downloader</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#000000,#1f1c2c);
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:25px;
  border-radius:15px;
}

input{
  width:85%;
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#ff9800;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎬 Video Downloader</h1>
  <input type="text" id="url" placeholder="Paste video URL">
  <br><br>
  <button onclick="download()">Download</button>

  <div class="result" id="result"></div>
</div>

<script>
async function download(){
  let url = document.getElementById("url").value;

  if(!url){
    alert("Enter URL");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Processing...";

  try{
    let res = await fetch("https://api.vevioz.com/api/button/mp4/" + encodeURIComponent(url));
    let data = await res.text();

    document.getElementById("result").innerHTML = data;

  } catch(e){
    document.getElementById("result").innerHTML = "❌ Failed!";
  }
}
</script>

</body>
</html>
