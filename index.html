<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Video Downloader - HD Video Download</title>

<meta name="description" content="Download videos from multiple platforms in HD quality. Fast, free and secure video downloader.">
<meta name="keywords" content="video downloader, free video download, HD video downloader">

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#000000,#1f1c2c);
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
  color:#ff9800;
}

input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#ff9800;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#ffa726;
}

.result{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎬 Video Downloader</h1>
  <p>Paste your video link below</p>

  <input type="text" id="url" placeholder="Paste video URL here">
  <br><br>
  <button onclick="downloadVideo()">Download</button>

  <div class="result" id="result"></div>
</div>

<script>
async function downloadVideo(){
  let url = document.getElementById("url").value;

  if(!url){
    alert("Enter URL");
    return;
  }

  document.getElementById("result").innerHTML = "Processing...";

  let res = await fetch("http://localhost:5000/download", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({url:url})
  });

  let data = await res.json();

  if(data.success){
    document.getElementById("result").innerHTML =
      `<a href="${data.download_url}" target="_blank">⬇ Download Video</a>`;
  } else {
    document.getElementById("result").innerHTML = "Failed!";
  }
}
</script>

</body>
  </html>
